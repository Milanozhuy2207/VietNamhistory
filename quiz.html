<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thử Thách - Hào Khí Sử Việt</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/quiz.css" />
  </head>
  <body class="quiz-bg">
    <div id="preloader">
      <div class="loader-content">
        <div class="year-counter" id="year-counter">2879 TCN</div>
        <div class="era-text" id="era-text">Kỷ nguyên Hùng Vương...</div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="loader-progress"></div>
        </div>
      </div>
    </div>

    <nav id="navbar" class="scrolled">
      <div class="logo">🇻🇳 HÀO KHÍ SỬ VIỆT</div>
      <div class="nav-actions">
        <div class="hamburger" id="hamburger">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Trang Chủ</a></li>
        <li><a href="trieudai.html">Các Triều Đại</a></li>
        <li><a href="danhnhan.html">Danh Nhân</a></li>
        <li><a href="bando.html">Bản Đồ</a></li>
        <li>
          <a
            href="quiz.html"
            class="quiz-link glow-effect"
            style="color: var(--gold)"
            >Thử Thách</a
          >
        </li>
      </ul>
    </nav>

    <div class="quiz-wrapper reveal">
      <div class="quiz-container glass-box glow-effect">
        <div id="quiz-header">
          <h1 style="color: var(--gold)">Thử Thách Trí Tuệ</h1>
          <div style="color: #4caf50; font-size: 20px; font-weight: bold">
            Điểm: <span id="score">0</span>
          </div>
          <div
            style="color: var(--gold); font-style: italic; margin-bottom: 10px"
          >
            🏆 Kỷ lục: <span id="high-score-display">0</span>
          </div>
        </div>

        <div id="quiz-body">
          <div class="timer-wrapper"><div id="timer-bar"></div></div>

          <h2 id="question" style="color: white; margin-top: 15px">
            Đang tải...
          </h2>
          <div id="options-container" class="options-grid"></div>
        </div>

        <div id="result-screen" class="hidden">
          <h2 style="color: var(--gold)">Hoàn Thành! 🎉</h2>
          <p>
            Tổng điểm: <span id="final-score">0</span> /
            <span id="max-score">0</span>
          </p>
          <button onclick="restartQuiz()" class="restart-btn glow-effect">
            Chơi Lại
          </button>
        </div>
      </div>
    </div>

    <div class="floating-theme-toggle glow-effect" id="theme-toggle">
      <i class="fa-solid fa-moon"></i>
    </div>

    <script src="js/global.js"></script>
    <script src="js/quiz.js"></script>
  </body>
</html>
